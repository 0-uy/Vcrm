<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // Some libraries try to polyfill fetch by assignment.
      if (typeof window !== 'undefined') {
        window.global = window;
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: () => originalFetch,
              set: (v) => { console.warn('Attempted to overwrite fetch', v); }
            });
          } catch (e) {
            // If we can't define it, it's likely already a getter or non-configurable
          }
        }
      }

      // Safety for JSON.parse("undefined")
      const originalParse = JSON.parse;
      JSON.parse = function(text, reviver) {
        if (text === 'undefined') {
          console.warn('Prevented JSON.parse("undefined")');
          return undefined;
        }
        return originalParse(text, reviver);
      };

      // Fix for next-themes or other libraries storing "undefined" in localStorage
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && localStorage.getItem(key) === 'undefined') {
            localStorage.removeItem(key);
          }
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
